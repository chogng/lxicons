<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lxicons</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f1ea;
      --bg-2: #ece6dc;
      --card: rgba(255, 255, 255, 0.72);
      --text: #1f1a17;
      --muted: #675f59;
      --border: rgba(31, 26, 23, 0.12);
      --shadow: 0 18px 50px rgba(56, 40, 26, 0.12);
      --accent: #0c7b93;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(224, 122, 95, 0.18), transparent 34%),
        radial-gradient(circle at top right, rgba(12, 123, 147, 0.14), transparent 30%),
        linear-gradient(180deg, var(--bg), var(--bg-2));
      min-height: 100vh;
    }

    .shell {
      max-width: 1440px;
      margin: 0 auto;
      padding: 32px 20px 48px;
    }

    .hero {
      display: grid;
      gap: 16px;
      margin-bottom: 24px;
      padding: 24px;
      border: 1px solid var(--border);
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.55);
      backdrop-filter: blur(14px);
      box-shadow: var(--shadow);
    }

    .eyebrow {
      margin: 0;
      color: var(--accent);
      font-size: 0.8rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-weight: 700;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.4rem, 5vw, 4.8rem);
      line-height: 0.95;
      letter-spacing: -0.05em;
    }

    .subtitle {
      margin: 0;
      max-width: 68ch;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.6;
    }

    .toolbar {
      display: grid;
      gap: 12px;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
    }

    .search {
      width: 100%;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.8);
      color: var(--text);
      border-radius: 999px;
      padding: 14px 18px;
      outline: none;
      font: inherit;
    }

    .search:focus {
      border-color: rgba(12, 123, 147, 0.45);
      box-shadow: 0 0 0 4px rgba(12, 123, 147, 0.12);
    }

    .count {
      color: var(--muted);
      font-size: 0.95rem;
      white-space: nowrap;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(132px, 1fr));
      gap: 14px;
    }

    .card {
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--card);
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 28px rgba(56, 40, 26, 0.07);
      padding: 16px 14px 12px;
      display: grid;
      gap: 10px;
      align-content: start;
      min-height: 150px;
    }

    .preview {
      width: 100%;
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0.5));
      overflow: hidden;
    }

    .preview img {
      width: 64px;
      height: 64px;
      display: block;
    }

    .name {
      font-size: 0.84rem;
      line-height: 1.35;
      color: var(--text);
      word-break: break-word;
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .action {
      appearance: none;
      border: 1px solid rgba(31, 26, 23, 0.14);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.84);
      color: var(--text);
      font: inherit;
      font-size: 0.78rem;
      padding: 8px 10px;
      cursor: pointer;
      transition: transform 140ms ease, border-color 140ms ease, background 140ms ease;
    }

    .action img {
      width: 16px;
      height: 16px;
      display: block;
    }

    .action:hover {
      transform: translateY(-1px);
      border-color: rgba(12, 123, 147, 0.38);
      background: rgba(255, 255, 255, 0.96);
    }

    .action:active {
      transform: translateY(0);
    }

    .action.is-success {
      border-color: rgba(12, 123, 147, 0.5);
      background: rgba(12, 123, 147, 0.12);
    }

    .action.is-error {
      border-color: rgba(196, 69, 54, 0.5);
      background: rgba(196, 69, 54, 0.12);
    }

    .status {
      padding: 18px 8px;
      color: var(--muted);
    }

    .empty {
      padding: 36px 8px;
      color: var(--muted);
    }

    @media (max-width: 720px) {
      .shell {
        padding: 18px 14px 28px;
      }

      .hero {
        padding: 18px;
        border-radius: 20px;
      }

      .toolbar {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <p class="eyebrow">SVG icon library</p>
      <h1>Lxicons</h1>
      <p class="subtitle">
        A searchable preview of every SVG in this repository. Use the search box to filter icons by name.
      </p>
      <div class="toolbar">
        <input id="search" class="search" type="search" placeholder="Search icons..." autocomplete="off" />
        <div id="count" class="count">Loading...</div>
      </div>
    </section>

    <section id="grid" class="grid" aria-live="polite">
      <div class="status">Loading icons...</div>
    </section>
  </main>

  <script>
    const grid = document.getElementById('grid');
    const search = document.getElementById('search');
    const count = document.getElementById('count');
    let allIcons = [];
    const svgCache = new Map();

    async function copyText(text) {
      await navigator.clipboard.writeText(text);
    }

    async function getSvgText(icon) {
      if (!svgCache.has(icon.file)) {
        svgCache.set(icon.file, fetch(icon.file, { cache: 'no-store' }).then(response => {
          if (!response.ok) {
            throw new Error(`Failed to load ${icon.file}: ${response.status}`);
          }
          return response.text();
        }));
      }

      return svgCache.get(icon.file);
    }

    async function handleAction(icon, action, button) {
      try {
        if (action === 'name') {
          await copyText(icon.name);
          button.classList.add('is-success');
        } else {
          const svg = await getSvgText(icon);
          await copyText(svg);
          button.classList.add('is-success');
        }
      } catch (error) {
        button.classList.add('is-error');
        console.error(error);
      } finally {
        window.setTimeout(() => {
          button.classList.remove('is-success', 'is-error');
        }, 1200);
      }
    }

    function createActionButton(iconName, label, onClick) {
      const button = document.createElement('button');
      button.className = 'action';
      button.type = 'button';
      button.title = label;
      button.setAttribute('aria-label', label);

      const img = document.createElement('img');
      img.alt = '';
      img.src = `./src/icons/${iconName}.svg`;
      button.appendChild(img);
      button.addEventListener('click', onClick);

      return button;
    }

    function getSearchTerms(icon) {
      const terms = new Set([icon.name.toLowerCase()]);
      const aliases = Array.isArray(icon.aliases) ? icon.aliases : [];
      const iconNames = typeof icon.name === 'string'
        ? [icon.name]
        : Array.isArray(icon.name) ? icon.name : [];
      const extraTerms = Array.isArray(icon.keywords)
        ? icon.keywords
        : Array.isArray(icon.terms) ? icon.terms : [];

      for (const alias of aliases) {
        terms.add(alias.toLowerCase());
      }

      for (const iconName of iconNames) {
        terms.add(iconName.toLowerCase());
      }

      for (const term of extraTerms) {
        terms.add(term.toLowerCase());
      }

      return Array.from(terms);
    }

    function render(list) {
      grid.innerHTML = '';

      if (list.length === 0) {
        grid.innerHTML = '<div class="empty">No icons match this search.</div>';
        count.textContent = '0 icons';
        return;
      }

      const fragment = document.createDocumentFragment();
      for (const icon of list) {
        const card = document.createElement('article');
        card.className = 'card';

        const preview = document.createElement('div');
        preview.className = 'preview';

        const img = document.createElement('img');
        img.loading = 'lazy';
        img.alt = icon.name;
        img.src = icon.file;
        preview.appendChild(img);

        const label = document.createElement('div');
        label.className = 'name';
        label.textContent = icon.name;

        const actions = document.createElement('div');
        actions.className = 'actions';

        const copyName = createActionButton('copy', 'Copy icon name', () => handleAction(icon, 'name', copyName));
        const copySvg = createActionButton('copy-code', 'Copy SVG', () => handleAction(icon, 'svg', copySvg));

        actions.append(copyName, copySvg);
        card.append(preview, label, actions);
        fragment.appendChild(card);
      }

      grid.appendChild(fragment);
      count.textContent = `${list.length} icon${list.length === 1 ? '' : 's'}`;
    }

    async function main() {
      try {
        const response = await fetch('./icons.json', { cache: 'no-store' });
        if (!response.ok) throw new Error(`Failed to load icons.json: ${response.status}`);
        const data = await response.json();
        allIcons = Array.isArray(data.icons) ? data.icons : [];
        render(allIcons);
      } catch (error) {
        grid.innerHTML = `<div class="empty">Unable to load the icon manifest. Build the site first, then publish the generated files. ${error.message}</div>`;
        count.textContent = 'Unavailable';
      }
    }

    search.addEventListener('input', () => {
      const query = search.value.trim().toLowerCase();
      const filtered = query
        ? allIcons.filter(icon => getSearchTerms(icon).some(term => term.includes(query)))
        : allIcons;
      render(filtered);
    });

    main();
  </script>
</body>
</html>
